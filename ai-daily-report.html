<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 日報</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #0a0a1a 0%, #0d1b2a 50%, #0a1628 100%);
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    color: #e8f4fd;
  }
  header {
    background: linear-gradient(90deg, rgba(0,120,255,0.15), rgba(0,200,180,0.1));
    border-bottom: 1px solid rgba(0,150,255,0.2);
    padding: 28px 24px 22px;
  }
  .feed-label { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #00ff88; box-shadow: 0 0 10px #00ff88;
    animation: pulse 2s infinite;
  }
  .feed-label span {
    font-size: 11px; letter-spacing: 3px; color: #00ff88;
    text-transform: uppercase; font-weight: 600;
  }
  h1 {
    font-size: 28px; font-weight: 700;
    background: linear-gradient(90deg, #ffffff, #7dd3fc);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 4px;
  }
  .subtitle { font-size: 13px; color: rgba(200,220,255,0.45); }
  main { padding: 24px; max-width: 720px; margin: 0 auto; }
  #fetch-btn {
    width: 100%; padding: 18px; border-radius: 14px; border: none;
    background: linear-gradient(135deg, #0070f3, #00b4d8);
    color: #fff; font-size: 16px; font-weight: 700;
    cursor: pointer; box-shadow: 0 4px 24px rgba(0,112,243,0.4);
    transition: all 0.3s; font-family: inherit;
  }
  #fetch-btn:disabled {
    background: rgba(0,80,180,0.4); box-shadow: none; cursor: not-allowed;
  }
  #last-updated {
    text-align: center; font-size: 12px;
    color: rgba(150,200,255,0.4); margin-top: 8px; min-height: 18px;
  }
  #loading-box {
    display: none; margin-top: 20px; padding: 20px 24px;
    background: rgba(0,80,180,0.08);
    border: 1px solid rgba(0,150,255,0.12); border-radius: 14px;
  }
  .loading-item {
    padding: 8px 0; font-size: 13px; color: rgba(120,200,255,0.5);
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .loading-item:last-child { border-bottom: none; }
  #error-box {
    display: none; margin-top: 20px; padding: 16px 20px;
    background: rgba(255,50,50,0.08);
    border: 1px solid rgba(255,80,80,0.25);
    border-radius: 12px; color: #fca5a5; font-size: 13px; line-height: 1.6;
  }
  #report-box {
    display: none; margin-top: 20px;
    background: rgba(255,255,255,0.02);
    border-radius: 16px; border: 1px solid rgba(0,150,255,0.12); overflow: hidden;
  }
  .report-header {
    padding: 12px 20px; background: rgba(0,100,255,0.08);
    border-bottom: 1px solid rgba(0,150,255,0.1);
    font-size: 11px; color: rgba(150,200,255,0.5);
    letter-spacing: 2px; text-transform: uppercase; font-weight: 600;
  }
  #report-content { padding: 20px 24px; line-height: 1.9; font-size: 14px; }
  #report-content h1, #report-content h2 {
    color: #7dd3fc !important; -webkit-text-fill-color: #7dd3fc !important;
    font-size: 15px; border-bottom: 1px solid rgba(0,150,255,0.2);
    padding-bottom: 6px; margin: 20px 0 10px;
  }
  #report-content h3 {
    color: #93c5fd !important; -webkit-text-fill-color: #93c5fd !important;
    font-size: 14px; margin: 14px 0 6px;
  }
  #report-content h4 {
    color: #bfdbfe !important; -webkit-text-fill-color: #bfdbfe !important;
    font-size: 13px; margin: 10px 0 6px;
  }
  #report-content hr {
    border: none; border-top: 1px solid rgba(255,255,255,0.08); margin: 18px 0;
  }
  #report-content ul { padding-left: 20px; margin: 8px 0; }
  #report-content li { margin: 5px 0; color: #cbd5e1; }
  #report-content strong { color: #e2e8f0; font-weight: 700; }
  #report-content p { margin: 8px 0; color: #94a3b8; }
  #empty-box {
    margin-top: 48px; text-align: center; color: rgba(150,180,220,0.25);
  }
  #empty-box .emoji { font-size: 52px; margin-bottom: 16px; }
  #empty-box p { font-size: 14px; line-height: 1.8; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
</style>
</head>
<body>

<header>
  <div class="feed-label">
    <div class="dot"></div>
    <span>AI Intelligence Feed</span>
  </div>
  <h1>AI 日報</h1>
  <p class="subtitle">毎日一回、世界のAI最新動向をキャッチ</p>
</header>

<main>
  <button id="fetch-btn" onclick="fetchReport()">📡 今日のAI日報を取得</button>
  <p id="last-updated"></p>

  <div id="loading-box">
    <div class="loading-item">🌐 世界中のAIニュースソースを検索</div>
    <div class="loading-item">🤖 新モデル・ツールのリリース情報を確認</div>
    <div class="loading-item">🏥 介護×AI関連情報を抽出</div>
    <div class="loading-item">💡 アプリ創作のタネを生成</div>
  </div>

  <div id="error-box"></div>

  <div id="report-box">
    <div class="report-header" id="report-header">📋 TODAY'S REPORT</div>
    <div id="report-content"></div>
  </div>

  <div id="empty-box">
    <div class="emoji">🛸</div>
    <p>ボタンを押すと<br>web検索でリアルタイム情報を集め<br>日本語でまとめます</p>
  </div>
</main>

<script>
const SYSTEM_PROMPT = `あなたはAI業界の動向を日本語で報告する専門アナリストです。
web_searchツールを使って実際の最新情報を収集し、以下の形式で日報を作成してください。

## 🤖 AI業界日報 — [今日の日付]

---

## 1. 📰 今日のビッグニュース
（最重要ニュース1〜2件。各項目：見出しを###で、解説を2〜3行で）

---

## 2. 🚀 注目のモデル・ツール
（新リリース・アップデート1〜2件）

---

## 3. 🔬 研究・技術トレンド
（論文・技術ブレークスルー1〜2件）

---

## 4. 🏥 介護×AIのヒント
（介護・福祉・障害支援領域でのAI活用につながる情報1件）

---

## 5. 💡 アプリ創作のタネ
（今日の情報から発想できる具体的なアプリアイデア2〜3件。箇条書きで「○○向けの△△アプリ」という形で）

必ずweb_searchで実際の最新情報を取得してから回答してください。`;

function getApiKey() {
  let key = localStorage.getItem('anthropic_api_key');
  if (!key) {
    key = prompt('Anthropic APIキーを入力してください（一度だけ保存されます）:');
    if (key && key.trim()) localStorage.setItem('anthropic_api_key', key.trim());
  }
  return key ? key.trim() : null;
}

function formatMarkdown(text) {
  // コードブロックを除去
  text = text.replace(/```[\s\S]*?```/g, '');
  // 見出し
  text = text.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  text = text.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  text = text.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  text = text.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // 太字（残った ** を処理）
  text = text.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
  // 孤立した * や ** を除去
  text = text.replace(/\*\*/g, '').replace(/(?<!\w)\*(?!\w)/g, '');
  // 水平線
  text = text.replace(/^---+$/gm, '<hr>');
  // リスト
  text = text.replace(/^[-・] (.+)$/gm, '<li>$1</li>');
  text = text.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  // 連続するliをulで囲む
  text = text.replace(/((<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');
  // 残りの行をpで囲む（タグ行以外）
  text = text.replace(/^(?!<[hul\/]|<hr)(.+)$/gm, (m) => m.trim() ? '<p>' + m + '</p>' : '');
  // 空p除去
  text = text.replace(/<p>\s*<\/p>/g, '');
  return text;
}

let progressTimer = null;

async function fetchReport() {
  const apiKey = getApiKey();
  if (!apiKey) return;

  const btn = document.getElementById('fetch-btn');
  const loadingBox = document.getElementById('loading-box');
  const errorBox = document.getElementById('error-box');
  const reportBox = document.getElementById('report-box');
  const emptyBox = document.getElementById('empty-box');

  btn.disabled = true;
  errorBox.style.display = 'none';
  reportBox.style.display = 'none';
  emptyBox.style.display = 'none';
  loadingBox.style.display = 'block';

  const steps = [
    '世界中のAIニュースを検索中...',
    '新モデル・ツール情報を確認中...',
    '介護×AI情報を精査中...',
    'アプリアイデアを抽出中...',
    'レポートを整形中...'
  ];
  let si = 0;
  btn.textContent = '⏳ ' + steps[0];
  progressTimer = setInterval(() => {
    si = (si + 1) % steps.length;
    btn.textContent = '⏳ ' + steps[si];
  }, 2500);

  const now = new Date();
  const dateStr = now.toLocaleDateString('ja-JP', {
    year: 'numeric', month: 'long', day: 'numeric', weekday: 'long'
  });

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1500,
        system: SYSTEM_PROMPT,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        messages: [{
          role: 'user',
          content: '今日は' + dateStr + 'です。web_searchを使って最新のAI情報を収集し、日報を作成してください。'
        }]
      })
    });

    if (!res.ok) {
      const t = await res.text();
      let msg = 'APIエラー ' + res.status;
      try { msg = JSON.parse(t).error?.message || msg; } catch(e) {}
      if (res.status === 401) {
        localStorage.removeItem('anthropic_api_key');
        msg = 'APIキーが無効です。ページを再読み込みして再入力してください。';
      }
      throw new Error(msg);
    }

    const data = await res.json();
    const text = (data.content || [])
      .filter(b => b.type === 'text')
      .map(b => b.text)
      .join('\n');

    if (!text) throw new Error('レスポンスにテキストが含まれていません');

    document.getElementById('report-content').innerHTML = formatMarkdown(text);
    document.getElementById('report-header').textContent =
      '📋 TODAY\'S REPORT · ' + now.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
    reportBox.style.display = 'block';
    document.getElementById('last-updated').textContent =
      '最終取得: ' + now.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });

  } catch(e) {
    errorBox.innerHTML = '<strong>⚠️ エラー</strong><br>' + e.message;
    errorBox.style.display = 'block';
    emptyBox.style.display = 'block';
  } finally {
    clearInterval(progressTimer);
    btn.disabled = false;
    btn.textContent = '📡 今日のAI日報を取得';
    loadingBox.style.display = 'none';
  }
}
</script>
</body>
</html>
