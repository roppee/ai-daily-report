<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 日報</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #0a0a1a 0%, #0d1b2a 50%, #0a1628 100%);
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    color: #e8f4fd;
  }
  header {
    background: linear-gradient(90deg, rgba(0,120,255,0.15), rgba(0,200,180,0.1));
    border-bottom: 1px solid rgba(0,150,255,0.2);
    padding: 24px 24px 20px;
  }
  .feed-label { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #00ff88; box-shadow: 0 0 10px #00ff88;
    animation: pulse 2s infinite;
  }
  .feed-label span { font-size: 11px; letter-spacing: 3px; color: #00ff88; text-transform: uppercase; font-weight: 600; }
  h1 {
    font-size: 28px; font-weight: 700;
    background: linear-gradient(90deg, #ffffff, #7dd3fc);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 4px;
  }
  .subtitle { font-size: 13px; color: rgba(200,220,255,0.45); }

  main { padding: 20px 24px; max-width: 720px; margin: 0 auto; }

  /* タブ */
  .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
  .tab-btn {
    flex: 1; padding: 10px; border-radius: 10px; border: 1px solid rgba(0,150,255,0.2);
    background: transparent; color: rgba(150,200,255,0.5);
    font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
    transition: all 0.2s;
  }
  .tab-btn.active {
    background: rgba(0,100,255,0.2); border-color: rgba(0,150,255,0.5);
    color: #7dd3fc;
  }

  /* 今日タブ */
  #fetch-btn {
    width: 100%; padding: 18px; border-radius: 14px; border: none;
    background: linear-gradient(135deg, #0070f3, #00b4d8);
    color: #fff; font-size: 16px; font-weight: 700;
    cursor: pointer; box-shadow: 0 4px 24px rgba(0,112,243,0.4);
    transition: all 0.3s; font-family: inherit;
  }
  #fetch-btn:disabled { background: rgba(0,80,180,0.4); box-shadow: none; cursor: not-allowed; }
  #last-updated { text-align: center; font-size: 12px; color: rgba(150,200,255,0.4); margin-top: 8px; min-height: 18px; }
  .sub-btns { display: flex; justify-content: center; gap: 12px; margin-top: 10px; }
  .sub-btn {
    background: none; border: 1px solid rgba(255,100,100,0.3);
    color: rgba(255,150,150,0.6); padding: 6px 16px;
    border-radius: 8px; font-size: 12px; cursor: pointer; font-family: inherit;
  }

  #loading-box {
    display: none; margin-top: 20px; padding: 20px 24px;
    background: rgba(0,80,180,0.08); border: 1px solid rgba(0,150,255,0.12); border-radius: 14px;
  }
  .loading-item { padding: 8px 0; font-size: 13px; color: rgba(120,200,255,0.5); border-bottom: 1px solid rgba(255,255,255,0.04); }
  .loading-item:last-child { border-bottom: none; }

  #error-box {
    display: none; margin-top: 20px; padding: 16px 20px;
    background: rgba(255,50,50,0.08); border: 1px solid rgba(255,80,80,0.25);
    border-radius: 12px; color: #fca5a5; font-size: 13px; line-height: 1.6;
  }

  .report-card {
    margin-top: 20px; background: rgba(255,255,255,0.02);
    border-radius: 16px; border: 1px solid rgba(0,150,255,0.12); overflow: hidden;
  }
  .report-card-header {
    padding: 12px 20px; background: rgba(0,100,255,0.08);
    border-bottom: 1px solid rgba(0,150,255,0.1);
    font-size: 11px; color: rgba(150,200,255,0.5);
    letter-spacing: 2px; text-transform: uppercase; font-weight: 600;
  }
  .report-card-body { padding: 20px 24px; line-height: 1.9; font-size: 14px; }

  #empty-box { margin-top: 48px; text-align: center; color: rgba(150,180,220,0.25); }
  #empty-box .emoji { font-size: 52px; margin-bottom: 16px; }
  #empty-box p { font-size: 14px; line-height: 1.8; }

  /* ログタブ */
  #log-tab { display: none; }
  .log-entry {
    margin-bottom: 16px; border-radius: 14px; overflow: hidden;
    border: 1px solid rgba(0,150,255,0.1);
  }
  .log-entry-header {
    padding: 12px 20px; background: rgba(0,80,180,0.12);
    display: flex; justify-content: space-between; align-items: center;
    cursor: pointer;
  }
  .log-entry-date { font-size: 13px; color: #7dd3fc; font-weight: 600; }
  .log-entry-toggle { font-size: 12px; color: rgba(150,200,255,0.4); }
  .log-entry-body {
    display: none; padding: 20px 24px;
    background: rgba(255,255,255,0.01);
    line-height: 1.9; font-size: 14px;
    border-top: 1px solid rgba(0,150,255,0.08);
  }
  .log-entry-body.open { display: block; }
  #log-empty { text-align: center; color: rgba(150,180,220,0.3); padding: 48px 0; font-size: 14px; }

  /* レポート内スタイル */
  .report-card-body h1, .report-card-body h2,
  .log-entry-body h1, .log-entry-body h2 {
    color: #7dd3fc !important; -webkit-text-fill-color: #7dd3fc !important;
    font-size: 15px; border-bottom: 1px solid rgba(0,150,255,0.2);
    padding-bottom: 6px; margin: 20px 0 10px;
  }
  .report-card-body h3, .log-entry-body h3 {
    color: #93c5fd !important; -webkit-text-fill-color: #93c5fd !important;
    font-size: 14px; margin: 14px 0 6px;
  }
  .report-card-body hr, .log-entry-body hr {
    border: none; border-top: 1px solid rgba(255,255,255,0.08); margin: 16px 0;
  }
  .report-card-body ul, .log-entry-body ul { padding-left: 20px; margin: 8px 0; }
  .report-card-body li, .log-entry-body li { margin: 5px 0; color: #cbd5e1; }
  .report-card-body strong, .log-entry-body strong { color: #e2e8f0; font-weight: 700; }
  .report-card-body p, .log-entry-body p { margin: 8px 0; color: #94a3b8; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
</style>
</head>
<body>

<header>
  <div class="feed-label">
    <div class="dot"></div>
    <span>AI Intelligence Feed</span>
  </div>
  <h1>AI 日報</h1>
  <p class="subtitle">毎日一回、世界のAI最新動向をキャッチ</p>
</header>

<main>
  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('today')">📡 今日</button>
    <button class="tab-btn" onclick="showTab('log')">📚 過去7日間</button>
  </div>

  <!-- 今日タブ -->
  <div id="today-tab">
    <button id="fetch-btn" onclick="fetchReport()">📡 今日のAI日報を取得</button>
    <p id="last-updated"></p>
    <div class="sub-btns">
      <button class="sub-btn" onclick="resetKey()">🔑 APIキーをリセット</button>
    </div>

    <div id="loading-box">
      <div class="loading-item">🌐 世界中のAIニュースソースを検索</div>
      <div class="loading-item">🤖 新モデル・ツールのリリース情報を確認</div>
      <div class="loading-item">🏥 介護×AI関連情報を抽出</div>
      <div class="loading-item">💡 アプリ創作のタネを生成</div>
    </div>

    <div id="error-box"></div>

    <div id="report-box" class="report-card" style="display:none;">
      <div class="report-card-header" id="report-header">📋 TODAY'S REPORT</div>
      <div class="report-card-body" id="report-content"></div>
    </div>

    <div id="empty-box">
      <div class="emoji">🛸</div>
      <p>ボタンを押すと<br>web検索でリアルタイム情報を集め<br>日本語でまとめます</p>
    </div>
  </div>

  <!-- ログタブ -->
  <div id="log-tab">
    <div id="log-list"></div>
    <p id="log-empty" style="display:none;">まだログがありません。<br>今日の日報を取得すると記録されます。</p>
  </div>
</main>

<script>
const LOG_KEY = 'ai_daily_report_logs';
const MAX_DAYS = 7;

// ---- ログ管理 ----
function getLogs() {
  try { return JSON.parse(localStorage.getItem(LOG_KEY) || '[]'); } catch(e) { return []; }
}

function saveLogs(logs) {
  localStorage.setItem(LOG_KEY, JSON.stringify(logs));
}

function addLog(dateStr, text) {
  let logs = getLogs();
  // 同じ日付があれば上書き
  logs = logs.filter(l => l.date !== dateStr);
  logs.unshift({ date: dateStr, text: text, savedAt: new Date().toISOString() });
  // 7日分だけ保持
  if (logs.length > MAX_DAYS) logs = logs.slice(0, MAX_DAYS);
  saveLogs(logs);
}

function getPastHeadlines() {
  const logs = getLogs();
  if (logs.length === 0) return '';
  // 各ログから###見出し行を抽出
  const headlines = [];
  logs.forEach(log => {
    const lines = log.text.split('\n');
    lines.forEach(line => {
      if (line.startsWith('###')) {
        headlines.push(line.replace(/^###\s*/, '').trim());
      }
    });
  });
  if (headlines.length === 0) return '';
  return '\n\n【過去7日間に報告済みのトピック（重複を避けてください）】\n' + headlines.map(h => '- ' + h).join('\n');
}

// ---- タブ ----
function showTab(tab) {
  document.getElementById('today-tab').style.display = tab === 'today' ? 'block' : 'none';
  document.getElementById('log-tab').style.display = tab === 'log' ? 'block' : 'none';
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', (tab === 'today' && i === 0) || (tab === 'log' && i === 1));
  });
  if (tab === 'log') renderLogs();
}

// ---- ログ表示 ----
function renderLogs() {
  const logs = getLogs();
  const list = document.getElementById('log-list');
  const empty = document.getElementById('log-empty');
  if (logs.length === 0) {
    list.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  list.innerHTML = logs.map((log, i) => `
    <div class="log-entry">
      <div class="log-entry-header" onclick="toggleLog(${i})">
        <span class="log-entry-date">📅 ${log.date}</span>
        <span class="log-entry-toggle" id="toggle-icon-${i}">▼ 開く</span>
      </div>
      <div class="log-entry-body" id="log-body-${i}">
        ${formatMarkdown(log.text)}
      </div>
    </div>
  `).join('');
}

function toggleLog(i) {
  const body = document.getElementById('log-body-' + i);
  const icon = document.getElementById('toggle-icon-' + i);
  const isOpen = body.classList.toggle('open');
  icon.textContent = isOpen ? '▲ 閉じる' : '▼ 開く';
}

// ---- APIキー ----
function getApiKey() {
  let key = localStorage.getItem('anthropic_api_key');
  if (!key) {
    key = prompt('Anthropic APIキーを入力してください（一度だけ保存されます）:');
    if (key && key.trim()) localStorage.setItem('anthropic_api_key', key.trim());
  }
  return key ? key.trim() : null;
}

function resetKey() {
  localStorage.removeItem('anthropic_api_key');
  alert('APIキーをリセットしました。次回ボタンを押すと再入力できます。');
}

// ---- Markdown変換 ----
function formatMarkdown(text) {
  text = text.replace(/```[\s\S]*?```/g, '');
  text = text.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  text = text.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  text = text.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  text = text.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  text = text.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\*\*/g, '').replace(/(?<!\w)\*(?!\w)/g, '');
  text = text.replace(/^---+$/gm, '<hr>');
  text = text.replace(/^[-・] (.+)$/gm, '<li>$1</li>');
  text = text.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  text = text.replace(/((<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');
  text = text.replace(/^(?!<[hul\/]|<hr)(.+)$/gm, m => m.trim() ? '<p>' + m + '</p>' : '');
  text = text.replace(/<p>\s*<\/p>/g, '');
  return text;
}

// ---- メイン処理 ----
let progressTimer = null;

async function fetchReport() {
  const apiKey = getApiKey();
  if (!apiKey) return;

  const btn = document.getElementById('fetch-btn');
  const loadingBox = document.getElementById('loading-box');
  const errorBox = document.getElementById('error-box');
  const reportBox = document.getElementById('report-box');
  const emptyBox = document.getElementById('empty-box');

  btn.disabled = true;
  errorBox.style.display = 'none';
  reportBox.style.display = 'none';
  emptyBox.style.display = 'none';
  loadingBox.style.display = 'block';

  const steps = ['世界中のAIニュースを検索中...', '新モデル・ツール情報を確認中...', '介護×AI情報を精査中...', 'アプリアイデアを抽出中...', 'レポートを整形中...'];
  let si = 0;
  btn.textContent = '⏳ ' + steps[0];
  progressTimer = setInterval(() => {
    si = (si + 1) % steps.length;
    btn.textContent = '⏳ ' + steps[si];
  }, 2500);

  const now = new Date();
  const dateStr = now.toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
  const pastHeadlines = getPastHeadlines();

  const systemPrompt = `あなたはAI業界の動向を日本語で報告する専門アナリストです。
web_searchツールを使って実際の最新情報を収集し、以下の形式で日報を作成してください。

【重要なルール】
- 回答は全て日本語で書いてください。英語の引用も日本語に訳してください。
- 文末に感嘆符（！）は使わないでください。
- 全セクションを必ず最後まで書き切ってください。途中で終わらないでください。${pastHeadlines}

## 🤖 AI業界日報 — [今日の日付]

---

## 1. 📰 今日のビッグニュース
（最重要ニュース1〜2件。各項目：見出しを###で、解説を2〜3行で）

---

## 2. 🚀 注目のモデル・ツール
（新リリース・アップデート1〜2件）

---

## 3. 🔬 研究・技術トレンド
（論文・技術ブレークスルー1〜2件）

---

## 4. 🏥 介護×AIのヒント
（介護・福祉・障害支援領域でのAI活用につながる情報1件）

---

## 5. 💡 アプリ創作のタネ
（今日の情報から発想できる具体的なアプリアイデア2〜3件。箇条書きで「○○向けの△△アプリ」という形で）

必ずweb_searchで実際の最新情報を取得してから、全セクションを日本語で書き切ってください。`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 2500,
        system: systemPrompt,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        messages: [{ role: 'user', content: '今日は' + dateStr + 'です。web_searchを使って最新のAI情報を収集し、日報を作成してください。' }]
      })
    });

    if (!res.ok) {
      const t = await res.text();
      let msg = 'APIエラー ' + res.status;
      try { msg = JSON.parse(t).error?.message || msg; } catch(e) {}
      if (res.status === 401) { localStorage.removeItem('anthropic_api_key'); msg = 'APIキーが無効です。ページを再読み込みして再入力してください。'; }
      throw new Error(msg);
    }

    const data = await res.json();
    const text = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('\n');
    if (!text) throw new Error('レスポンスにテキストが含まれていません');

    // 表示
    document.getElementById('report-content').innerHTML = formatMarkdown(text);
    document.getElementById('report-header').textContent = '📋 TODAY\'S REPORT · ' + now.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
    reportBox.style.display = 'block';
    document.getElementById('last-updated').textContent = '最終取得: ' + now.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });

    // ログ保存
    addLog(dateStr, text);

  } catch(e) {
    errorBox.innerHTML = '<strong>⚠️ エラー</strong><br>' + e.message;
    errorBox.style.display = 'block';
    emptyBox.style.display = 'block';
  } finally {
    clearInterval(progressTimer);
    btn.disabled = false;
    btn.textContent = '📡 今日のAI日報を取得';
    loadingBox.style.display = 'none';
  }
}
</script>
</body>
</html>
